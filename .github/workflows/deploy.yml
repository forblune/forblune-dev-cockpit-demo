name: Deploy to GitHub Pages

# main에 push되면 정적 빌드를 GitHub Pages로 배포한다. (수동 실행도 가능)
on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages 배포에 필요한 최소 권한.
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포는 1개로 제한 (진행 중인 배포는 취소하지 않음).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (base=/forblune-dev-cockpit-demo/)
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
